<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond Third Vision | Professional Multimedia Partner</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Background Tech Aesthetic */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(11, 12, 16, 0.85), rgba(11, 12, 16, 0.95)), 
                        url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920') no-repeat center center/cover;
            z-index: -1;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }
        .tagline-top {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff6b35; /* Crisp Orange */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }
        .tagline-sub {
            font-size: 1.2rem;
            color: #a8b2c1;
            font-style: italic;
            margin-bottom: 2.5rem;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            color: #ff007f; /* Neon Impact Pink */
            line-height: 1.2;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
            margin-bottom: 1.5rem;
        }
        @media(max-width: 768px) {
            h1 { font-size: 2.3rem; }
            .tagline-top { font-size: 1.2rem; }
        }
        .description {
            font-size: 1.1rem;
            color: #c5c6c7;
            max-width: 600px;
            margin: 0 auto 3rem auto;
            line-height: 1.6;
        }
        .cta-btn {
            display: inline-block;
            background: linear-gradient(90deg, #ff007f 0%, #ff6b35 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 35px;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }
        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.5);
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <div class="tagline-top">We Cut. You Shine.</div>
        <div class="tagline-sub">Precision post-production workflows</div>
        
        <h1>Where Vision<br>Becomes Impact</h1>
        
        <p class="description">
            Transforming raw footage into high-retention cinematic assets. Built for modern creators, brands, and digital infrastructure environments.
        </p>
        
        <a href="mailto:your-email@domain.com" class="cta-btn">Initiate Project</a>
    </div>

</body>
</html>
